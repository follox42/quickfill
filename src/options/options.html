<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="options.css">
  <title>QuickFill — Profiles</title>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <h1 class="logo-text">QuickFill</h1>
      </div>
      <p class="subtitle">Manage your auto-fill profiles</p>
    </header>

    <main class="main">
      <!-- Profiles List -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Profiles</h2>
          <button id="btn-add" class="btn-add" title="Add profile">+</button>
        </div>
        <div id="profiles-list" class="profiles-list"></div>
        <div id="profile-limit" class="profile-limit"></div>
        <button id="upgrade-banner" class="upgrade-banner" type="button">
          <span class="upgrade-banner-icon">&#x2728;</span>
          <span class="upgrade-banner-text">Upgrade to Pro</span>
          <span class="upgrade-banner-arrow">&#x2192;</span>
        </button>
      </aside>

      <!-- Profile Editor -->
      <section class="editor" id="editor">
        <div class="editor-empty" id="editor-empty">
          <p>Select a profile to edit, or create a new one</p>
        </div>
        <form id="profile-form" class="profile-form hidden">
          <div class="form-header">
            <div class="form-header-left">
              <input type="text" id="profile-icon" class="input-icon" maxlength="2" title="Profile emoji">
              <input type="text" id="profile-name" class="input-name" placeholder="Profile name" required>
            </div>
            <button type="button" id="btn-delete" class="btn-delete" title="Delete profile">
              Delete
            </button>
          </div>

          <div class="form-grid">
            <h3 class="form-section-title">Identity</h3>
            <div class="form-row">
              <div class="form-group">
                <label for="field-firstName">First Name</label>
                <input type="text" id="field-firstName" data-field="firstName" placeholder="John">
              </div>
              <div class="form-group">
                <label for="field-lastName">Last Name</label>
                <input type="text" id="field-lastName" data-field="lastName" placeholder="Doe">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="field-email">Email</label>
                <input type="email" id="field-email" data-field="email" placeholder="john@example.com">
              </div>
              <div class="form-group">
                <label for="field-phone">Phone</label>
                <input type="tel" id="field-phone" data-field="phone" placeholder="+33 6 12 34 56 78">
              </div>
            </div>

            <h3 class="form-section-title">Work</h3>
            <div class="form-row">
              <div class="form-group">
                <label for="field-company">Company</label>
                <input type="text" id="field-company" data-field="company" placeholder="Acme Inc.">
              </div>
              <div class="form-group">
                <label for="field-jobTitle">Job Title</label>
                <input type="text" id="field-jobTitle" data-field="jobTitle" placeholder="Developer">
              </div>
            </div>

            <h3 class="form-section-title">Address</h3>
            <div class="form-row">
              <div class="form-group full">
                <label for="field-address">Address</label>
                <input type="text" id="field-address" data-field="address" placeholder="123 Main Street">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="field-city">City</label>
                <input type="text" id="field-city" data-field="city" placeholder="Paris">
              </div>
              <div class="form-group">
                <label for="field-zipCode">Zip Code</label>
                <input type="text" id="field-zipCode" data-field="zipCode" placeholder="75001">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="field-state">State / Region</label>
                <input type="text" id="field-state" data-field="state" placeholder="Ile-de-France">
              </div>
              <div class="form-group">
                <label for="field-country">Country</label>
                <input type="text" id="field-country" data-field="country" placeholder="France">
              </div>
            </div>

            <h3 class="form-section-title">Other</h3>
            <div class="form-row">
              <div class="form-group">
                <label for="field-username">Username</label>
                <input type="text" id="field-username" data-field="username" placeholder="johndoe">
              </div>
              <div class="form-group">
                <label for="field-website">Website</label>
                <input type="url" id="field-website" data-field="website" placeholder="https://example.com">
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-save">Save Profile</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="options.js"></script>
</body>
</html>
